<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>00:00.00 — Stopwatch</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #ffffff;
      color: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0f0f0f; color: #eeeeee; }
    }

    #sw {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 1rem;
    }

    #time {
      font-size: clamp(4rem, 18vw, 13rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      text-align: center;
      width: 100%;
      white-space: nowrap;
    }

    #ms {
      font-size: clamp(1.5rem, 5vw, 4rem);
      font-weight: 400;
      color: #888888;
      letter-spacing: 0.05em;
      margin-top: 0.3em;
      text-align: center;
    }

    #controls {
      display: flex;
      gap: 16px;
      margin-top: 2.5rem;
    }

    .btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      min-width: 100px;
    }

    .btn:active { transform: scale(0.97); }

    /* Start/Pause — filled */
    .btn.primary {
      background: #111111;
      color: #ffffff;
      border: 1px solid #111111;
    }
    .btn.primary:hover { opacity: 0.75; }

    /* Reset — always outlined with visible border */
    .btn.secondary {
      background: transparent;
      color: #111111;
      border: 1.5px solid #111111;
    }
    .btn.secondary:hover { background: rgba(0,0,0,0.06); }

    @media (prefers-color-scheme: dark) {
      .btn.primary {
        background: #eeeeee;
        color: #0f0f0f;
        border-color: #eeeeee;
      }
      .btn.primary:hover { opacity: 0.8; }

      .btn.secondary {
        background: transparent;
        color: #eeeeee;
        border: 1.5px solid #eeeeee;
      }
      .btn.secondary:hover { background: rgba(255,255,255,0.08); }
    }

    #status {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      transition: background 0.3s;
    }

    @media (prefers-color-scheme: dark) {
      #status { background: rgba(255,255,255,0.15); }
    }

    #status.running { background: #1D9E75; }

    #hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.06em;
      color: #aaaaaa;
      font-family: inherit;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="sw">
    <div id="status"></div>
    <div style="text-align:center">
      <div id="time">00:00</div>
      <div id="ms">.00</div>
    </div>
    <div id="controls">
      <button class="btn primary" id="startStop">Start</button>
      <button class="btn secondary" id="reset">Reset</button>
    </div>
    <div id="hint">space — start / pause &nbsp;&nbsp; r — reset</div>
  </div>

  <script>
    let running = false, startTime = 0, elapsed = 0, raf = null;

    const timeEl       = document.getElementById('time');
    const msEl         = document.getElementById('ms');
    const startStopBtn = document.getElementById('startStop');
    const resetBtn     = document.getElementById('reset');
    const statusDot    = document.getElementById('status');

    function fmt(ms) {
      const total = Math.floor(ms / 10);
      const cs    = total % 100;
      const s     = Math.floor(total / 100) % 60;
      const m     = Math.floor(total / 6000) % 60;
      const h     = Math.floor(total / 360000);
      const pad   = n => String(n).padStart(2, '0');
      const main  = h > 0
        ? `${pad(h)}:${pad(m)}:${pad(s)}`
        : `${pad(m)}:${pad(s)}`;
      return { main, cs: pad(cs) };
    }

    function tick() {
      elapsed = Date.now() - startTime;
      const { main, cs } = fmt(elapsed);
      timeEl.textContent = main;
      msEl.textContent   = '.' + cs;
      document.title     = main + '.' + cs + ' — Stopwatch';
      raf = requestAnimationFrame(tick);
    }

    startStopBtn.addEventListener('click', () => {
      if (!running) {
        startTime = Date.now() - elapsed;
        running   = true;
        startStopBtn.textContent = 'Pause';
        statusDot.classList.add('running');
        tick();
      } else {
        running = false;
        cancelAnimationFrame(raf);
        startStopBtn.textContent = 'Resume';
        statusDot.classList.remove('running');
      }
    });

    resetBtn.addEventListener('click', () => {
      running = false;
      cancelAnimationFrame(raf);
      elapsed = 0;
      timeEl.textContent       = '00:00';
      msEl.textContent         = '.00';
      startStopBtn.textContent = 'Start';
      statusDot.classList.remove('running');
      document.title           = '00:00.00 — Stopwatch';
    });

    document.addEventListener('keydown', e => {
      if (e.code === 'Space') { e.preventDefault(); startStopBtn.click(); }
      if (e.code === 'KeyR')  resetBtn.click();
    });
  </script>
</body>
</html>
