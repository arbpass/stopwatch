<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="pageTitle">00:00:00</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237c6af5'/%3E%3Ccircle cx='16' cy='17' r='9' fill='none' stroke='white' stroke-width='2.2'/%3E%3Cline x1='16' y1='17' x2='16' y2='11' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='17' x2='20' y2='17' stroke='%23a78bfa' stroke-width='2' stroke-linecap='round'/%3E%3Crect x='13' y='4' width='6' height='2.2' rx='1.1' fill='white'/%3E%3Cline x1='26' y1='8' x2='24' y2='10' stroke='white' stroke-width='1.8' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c27;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f0ff;
      --muted: rgba(240,240,255,0.45);
      --accent: #7c6af5;
      --accent2: #a78bfa;
      --green: #4ade80;
      --red: #f87171;
      --amber: #fbbf24;
      --mono: 'Space Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
      --glow: 0 0 40px rgba(124,106,245,0.18);
    }

    .light {
      --bg: #f0efff;
      --surface: #ffffff;
      --surface2: #ece9ff;
      --border: rgba(0,0,0,0.07);
      --border2: rgba(0,0,0,0.13);
      --text: #1a1730;
      --muted: rgba(26,23,48,0.45);
      --accent: #5b46e8;
      --accent2: #7c6af5;
      --green: #16a34a;
      --red: #dc2626;
      --amber: #d97706;
      --glow: 0 0 40px rgba(91,70,232,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.4s, color 0.4s;
    }

    .shell {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ─── Top bar ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--mono);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--accent2);
    }
    .topbar-right { display: flex; align-items: center; gap: 0.75rem; }

    .live-clock {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 999px;
      padding: 0.35rem 0.85rem;
      letter-spacing: 0.05em;
    }

    .theme-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      transition: background 0.2s, border-color 0.2s;
      color: var(--text);
    }
    .theme-btn:hover { background: var(--surface2); }

    /* ─── Tab bar ─── */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 5px;
      gap: 4px;
    }
    .tab {
      padding: 0.65rem;
      border-radius: 12px;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 500;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.03em;
    }
    .tab.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 20px rgba(124,106,245,0.35);
    }
    .tab:not(.active):hover { color: var(--text); background: var(--surface2); }

    /* ─── Main card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.25rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      box-shadow: var(--glow);
      transition: box-shadow 0.4s;
    }

    .panel { display: none; flex-direction: column; align-items: center; gap: 2rem; width: 100%; }
    .panel.active { display: flex; }

    /* ─── Ring display ─── */
    .ring-wrap {
      position: relative;
      width: 220px; height: 220px;
      display: flex; align-items: center; justify-content: center;
    }
    .ring-svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .ring-track { fill: none; stroke: var(--surface2); stroke-width: 6; }
    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 565.5;
      stroke-dashoffset: 565.5;
      transition: stroke-dashoffset 0.5s ease, stroke 0.4s;
    }
    .ring-progress.running { stroke: var(--green); }
    .ring-progress.timer-running { stroke: var(--amber); }
    .ring-progress.timer-done { stroke: var(--red); }

    .time-inner {
      text-align: center;
      z-index: 1;
    }
    .time-display {
      font-family: var(--mono);
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }
    .time-display.running { color: var(--green); }
    .time-display.timer-running { color: var(--amber); }
    .time-display.timer-done { color: var(--red); }

    .time-sub {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      margin-top: 0.45rem;
      text-transform: uppercase;
    }

    /* ─── Controls ─── */
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .btn {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.7rem 1.4rem;
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 18px rgba(124,106,245,0.3);
    }
    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    .btn-danger { border-color: rgba(248,113,113,0.4); }
    .btn-danger:hover { border-color: var(--red); color: var(--red); }

    .btn-success { border-color: rgba(74,222,128,0.3); }
    .btn-success:hover { border-color: var(--green); color: var(--green); }

    .btn-icon { font-size: 1rem; }

    /* ─── Timer inputs ─── */
    .timer-inputs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--mono);
    }
    .timer-inputs input {
      width: 80px;
      text-align: center;
      font-family: var(--mono);
      font-size: 2rem;
      font-weight: 700;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.4rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .timer-inputs input:focus { border-color: var(--accent2); }
    .timer-inputs input::-webkit-inner-spin-button,
    .timer-inputs input::-webkit-outer-spin-button { -webkit-appearance: none; }
    .timer-sep {
      font-size: 2rem;
      font-weight: 700;
      color: var(--muted);
      line-height: 1;
      padding-bottom: 0.1rem;
    }
    .timer-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-align: center;
      margin-top: 0.3rem;
    }

    /* ─── Laps ─── */
    .laps-section {
      width: 100%;
    }
    .laps-head {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.65rem;
      padding: 0 0.25rem;
    }
    .laps-list {
      list-style: none;
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-right: 2px;
    }
    .laps-list::-webkit-scrollbar { width: 4px; }
    .laps-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .lap-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0.85rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      animation: slideIn 0.2s ease;
    }
    .lap-num { color: var(--muted); font-size: 0.75rem; font-weight: 600; }
    .lap-time { font-family: var(--mono); font-size: 0.88rem; color: var(--accent2); }
    .lap-delta { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Alert ─── */
    .done-badge {
      display: none;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--red);
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: var(--radius-sm);
      padding: 0.55rem 1rem;
      animation: pulse 1s infinite alternate;
    }
    .done-badge.show { display: flex; }
    @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; } }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .time-display { font-size: 2rem; }
      .ring-wrap { width: 180px; height: 180px; }
      .ring-svg { width: 180px; height: 180px; }
      .ring-track, .ring-progress { stroke-width: 5; }
      .btn { padding: 0.6rem 1rem; font-size: 0.8rem; }
      .card { padding: 1.75rem 1.25rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->
  <div class="topbar">
    <span class="logo">CHRONOX</span>
    <div class="topbar-right">
      <div class="live-clock" id="clock">12:00 AM</div>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showPanel('stopwatch')">⏱ Stopwatch</button>
    <button class="tab" onclick="showPanel('timer')">⏳ Timer</button>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- STOPWATCH panel -->
    <div id="stopwatch" class="panel active">
      <div class="ring-wrap">
        <svg class="ring-svg" width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="90"/>
          <circle class="ring-progress" id="swRing" cx="110" cy="110" r="90"/>
        </svg>
        <div class="time-inner">
          <div class="time-display" id="swDisplay">00:00:00</div>
          <div class="time-sub" id="swStatus">READY</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" onclick="startStopwatch()" id="swStartBtn">▶ Start</button>
        <button class="btn btn-danger" onclick="stopStopwatch()">⏸ Pause</button>
        <button class="btn btn-success" onclick="lapStopwatch()">⊕ Lap</button>
        <button class="btn" onclick="resetStopwatch()">↺ Reset</button>
      </div>

      <div class="laps-section" id="lapsSection" style="display:none">
        <div class="laps-head">Lap times</div>
        <ul class="laps-list" id="lapsList"></ul>
      </div>
    </div>

    <!-- TIMER panel -->
    <div id="timer" class="panel">
      <div class="timer-inputs">
        <div>
          <input type="number" id="min" min="0" max="99" placeholder="00" value="5">
          <div class="timer-label">MIN</div>
        </div>
        <span class="timer-sep">:</span>
        <div>
          <input type="number" id="sec" min="0" max="59" placeholder="00" value="00">
          <div class="timer-label">SEC</div>
        </div>
      </div>

      <div class="ring-wrap">
        <svg class="ring-svg" width="220" height="220" viewBox="0 0 220 220">
          <circle class="ring-track" cx="110" cy="110" r="90"/>
          <circle class="ring-progress" id="timerRing" cx="110" cy="110" r="90"/>
        </svg>
        <div class="time-inner">
          <div class="time-display" id="timerDisplay">00:00</div>
          <div class="time-sub" id="timerStatus">SET TIME</div>
        </div>
      </div>

      <div class="done-badge" id="doneBadge">⚠ Time's up!</div>

      <div class="controls">
        <button class="btn btn-primary" onclick="startTimer()">▶ Start</button>
        <button class="btn btn-danger" onclick="stopTimer()">⏸ Pause</button>
        <button class="btn" onclick="resetTimer()">↺ Reset</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ── Theme ──
  function toggleTheme() {
    document.body.classList.toggle('light');
    document.getElementById('themeBtn').textContent =
      document.body.classList.contains('light') ? '☀️' : '🌙';
  }

  // ── Clock ──
  function updateClock() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent =
      `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }
  setInterval(updateClock, 10000); updateClock();

  // ── Tabs ──
  function showPanel(id) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', (i===0 && id==='stopwatch') || (i===1 && id==='timer'));
    });
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ── Ring helper ──
  const CIRC = 2 * Math.PI * 90; // ≈ 565.5
  function setRing(id, fraction, state) {
    const el = document.getElementById(id);
    const offset = CIRC * (1 - Math.max(0, Math.min(1, fraction)));
    el.style.strokeDashoffset = offset;
    el.className = 'ring-progress' + (state ? ' ' + state : '');
  }

  // ── Stopwatch ──
  let swInterval = null, swMs = 0, swRunning = false;
  let lapCount = 0, lastLapMs = 0;

  function formatSW(ms) {
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
  function formatShort(ms) {
    const m = Math.floor(ms / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    const cs = Math.floor((ms % 1000) / 10);
    return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  }

  function updateSW() {
    const disp = document.getElementById('swDisplay');
    const status = document.getElementById('swStatus');
    const txt = formatSW(swMs);
    disp.textContent = txt;
    document.getElementById('pageTitle').textContent = `${txt} — ChronoX`;
    const frac = (swMs % 60000) / 60000;
    setRing('swRing', frac, swRunning ? 'running' : '');
    if (swRunning) {
      disp.className = 'time-display running';
      status.textContent = 'RUNNING';
    } else if (swMs > 0) {
      disp.className = 'time-display';
      status.textContent = 'PAUSED';
    } else {
      disp.className = 'time-display';
      status.textContent = 'READY';
    }
  }

  let swLast;
  function startStopwatch() {
    if (swRunning) return;
    swRunning = true;
    swLast = Date.now() - swMs;
    swInterval = setInterval(() => {
      swMs = Date.now() - swLast;
      updateSW();
    }, 50);
    updateSW();
  }
  function stopStopwatch() {
    swRunning = false;
    clearInterval(swInterval); swInterval = null;
    updateSW();
  }
  function resetStopwatch() {
    stopStopwatch();
    swMs = 0; lapCount = 0; lastLapMs = 0;
    document.getElementById('lapsList').innerHTML = '';
    document.getElementById('lapsSection').style.display = 'none';
    setRing('swRing', 0, '');
    updateSW();
  }
  function lapStopwatch() {
    if (!swRunning && swMs === 0) return;
    const delta = swMs - lastLapMs;
    lastLapMs = swMs;
    lapCount++;
    const li = document.createElement('li');
    li.className = 'lap-item';
    li.innerHTML = `
      <span class="lap-num">LAP ${String(lapCount).padStart(2,'0')}</span>
      <span class="lap-time">${formatShort(swMs)}</span>
      <span class="lap-delta">+${formatShort(delta)}</span>`;
    const ul = document.getElementById('lapsList');
    ul.prepend(li);
    document.getElementById('lapsSection').style.display = 'block';
  }
  updateSW();

  // ── Timer ──
  let timerInterval = null, timeLeft = 0, timerTotal = 0;

  function formatTimer(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }
  function updateTimer() {
    const disp = document.getElementById('timerDisplay');
    const status = document.getElementById('timerStatus');
    disp.textContent = formatTimer(timeLeft);
    const frac = timerTotal > 0 ? timeLeft / timerTotal : 0;
    if (timerInterval) {
      setRing('timerRing', frac, 'timer-running');
      disp.className = 'time-display timer-running';
      status.textContent = 'COUNTING';
    } else if (timeLeft === 0 && timerTotal > 0) {
      setRing('timerRing', 0, 'timer-done');
      disp.className = 'time-display timer-done';
      status.textContent = "TIME'S UP";
    } else {
      setRing('timerRing', frac, '');
      disp.className = 'time-display';
      status.textContent = timeLeft > 0 ? 'PAUSED' : 'SET TIME';
    }
  }
  function startTimer() {
    if (timerInterval) return;
    const m = parseInt(document.getElementById('min').value) || 0;
    const s = parseInt(document.getElementById('sec').value) || 0;
    if (timeLeft === 0) {
      timeLeft = m * 60 + s;
      timerTotal = timeLeft;
    }
    if (timeLeft <= 0) return;
    document.getElementById('doneBadge').classList.remove('show');
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimer();
      if (timeLeft <= 0) {
        clearInterval(timerInterval); timerInterval = null;
        document.getElementById('doneBadge').classList.add('show');
        updateTimer();
      }
    }, 1000);
    updateTimer();
  }
  function stopTimer() {
    clearInterval(timerInterval); timerInterval = null;
    updateTimer();
  }
  function resetTimer() {
    stopTimer();
    timeLeft = 0; timerTotal = 0;
    document.getElementById('min').value = '';
    document.getElementById('sec').value = '';
    document.getElementById('doneBadge').classList.remove('show');
    setRing('timerRing', 0, '');
    updateTimer();
  }
  updateTimer();
</script>
</body>
</html>
